version: "3.9"

# AutoFix AI — development docker-compose
# GAP 1 FIX: app container mounts /var/run/docker.sock so SafetyValidatorService
# can spawn ephemeral child containers for patch validation (Docker-in-Docker pattern).
# The child containers run with --network=none --memory=512m --no-new-privileges.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://autofix:autofix@db:5432/autofix
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-production-min-32}
      LOG_LEVEL: INFO
      DEBUG: "false"
      WIKI_DIR: /app/debug_wiki/errors
    volumes:
      - ./debug_wiki:/app/debug_wiki
      - ./config:/app/config:ro
      # GAP 1 FIX: Docker socket mount — allows app to spawn child containers for sandbox
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autofix
      POSTGRES_PASSWORD: autofix
      POSTGRES_DB: autofix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autofix -d autofix"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
