# Removed obsolete version tag to clear the warning
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    environment:
      # These variables override your .env file inside the container
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://autofix:autofix@db:5432/autofix
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: INFO
      DEBUG: "false"
      WIKI_DIR: /app/debug_wiki/errors
      PORT: 8000
    volumes:
      - ./debug_wiki:/app/debug_wiki
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock # GAP 1: Sandbox isolation
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autofix
      POSTGRES_PASSWORD: autofix
      POSTGRES_DB: autofix
    ports:
      - "5433:5432" # Changed external port to 5433 to avoid local collisions
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autofix -d autofix"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend: # MOVED: Now correctly aligned under 'services'
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  postgres_data: