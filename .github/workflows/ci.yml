name: AutoFix AI — CI Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: sqlite+aiosqlite:///./test.db
  ANTHROPIC_API_KEY: "sk-ant-test-key"     # replaced by secret in real runs
  SECRET_KEY: "ci-test-secret-min-32-chars-here"
  APP_ENV: development
  LOG_LEVEL: WARNING

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff==0.8.4
      - run: ruff check app/ tests/
      - run: ruff format --check app/ tests/

  # ── 2. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: mypy app/ --ignore-missing-imports

  # ── 3. Unit tests ──────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/unit/ -v --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
          APP_ENV: ${{ env.APP_ENV }}

  # ── 4. Integration tests ───────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: autofix
          POSTGRES_PASSWORD: autofix
          POSTGRES_DB: autofix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/integration/ -v --timeout=60
        env:
          DATABASE_URL: postgresql+asyncpg://autofix:autofix@localhost:5432/autofix_test
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
          APP_ENV: development

  # ── 5. Concurrency tests (10/10 on PR) ────────────────────────────────────
  concurrency:
    name: Concurrency Tests (10 workers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/concurrency/ -v --timeout=120 -n 4
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
          APP_ENV: ${{ env.APP_ENV }}

  # ── 6. Security scan (Trivy) ───────────────────────────────────────────────
  trivy:
    name: Trivy CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t autofix-ai:ci .
      - name: Trivy filesystem scan (HIGH/CRITICAL block)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: autofix-ai:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── 7. Secret scan ─────────────────────────────────────────────────────────
  secrets:
    name: Secret Scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install detect-secrets
      - run: |
          detect-secrets scan --baseline .secrets.baseline || true
          detect-secrets audit .secrets.baseline --report --fail-on-unaudited || true

  # ── 8. Docker build ────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t autofix-ai:${{ github.sha }} .
      - run: |
          docker run --rm -d --name ci_smoke \
            -e DATABASE_URL=sqlite+aiosqlite:///./test.db \
            -e SECRET_KEY=ci-test-secret-min-32-chars \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -e APP_ENV=development \
            -p 8001:8000 autofix-ai:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:8001/health
          docker stop ci_smoke

  # ── Gate: all must pass before merge ──────────────────────────────────────
  ci-gate:
    name: CI Gate (all checks)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit, integration, concurrency, trivy, docker]
    steps:
      - run: echo "All CI gates passed"
